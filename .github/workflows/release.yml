name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Each platform updates the shared latest.json asset. Running serially
      # prevents parallel jobs from overwriting another platform's entries.
      max-parallel: 1
      matrix:
        include:
          - platform: windows-latest
            target: ""
          - platform: ubuntu-22.04
            target: ""
          - platform: macos-15
            target: x86_64-apple-darwin
          - platform: macos-15
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout AIO
        uses: actions/checkout@v4

      # package.json uses file:../aio-models-data. The sibling repository must
      # exist before npm ci so Tauri can bundle dist/data/models.json.
      - name: Checkout models data
        shell: bash
        env:
          MODELS_DATA_REF: b314a90bb979da07e654bb995aa44cff26476cfe
        run: |
          MODELS_DATA_DIR="${GITHUB_WORKSPACE}/../aio-models-data"
          rm -rf "$MODELS_DATA_DIR"
          git clone --no-checkout https://github.com/Atom112/aio-models-data.git "$MODELS_DATA_DIR"
          git -C "$MODELS_DATA_DIR" checkout "$MODELS_DATA_REF"
          test -f "$MODELS_DATA_DIR/dist/data/models.json"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify bundled model catalog
        shell: bash
        run: test -f node_modules/@aio/models-data/dist/data/models.json

      - name: Build and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: AIO v__VERSION__
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: >-
            ${{
              matrix.platform == 'ubuntu-22.04'
              && '--bundles deb,rpm --verbose'
              || (matrix.target != '' && format('--target {0} --verbose', matrix.target) || '--verbose')
            }}
